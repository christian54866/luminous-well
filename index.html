<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUMINOUS WELL</title>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
            touch-action: none; /* Prevents accidental scrolling/refreshing */
        }
        #orb { 
            width: 60vw; 
            height: 60vw; 
            max-width: 300px;
            max-height: 300px;
            border-radius: 50%; 
            background: radial-gradient(circle, #fff 0%, #00d4ff 50%, #002fcc 100%); 
            box-shadow: 0 0 80px #00d4ff;
            transition: transform 0.05s linear;
        }
        #btn {
            padding: 20px 40px;
            background: none;
            border: 2px solid #00d4ff;
            color: #00d4ff;
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            letter-spacing: 3px;
            cursor: pointer;
            z-index: 10;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

    <button id="btn">INITIALIZE</button>
    <div id="orb" class="hidden"></div>

    <script>
        let audioCtx, osc, gain, filter;

        const btn = document.getElementById('btn');
        const orb = document.getElementById('orb');

        btn.addEventListener('click', async () => {
            // 1. Request iPhone Motion Permissions
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                const permission = await DeviceOrientationEvent.requestPermission();
                if (permission !== 'granted') {
                    alert('Permission denied. Tilt won\'t work.');
                    return;
                }
            }

            // 2. Setup Audio
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            osc = audioCtx.createOscillator();
            gain = audioCtx.createGain();
            filter = audioCtx.createBiquadFilter();

            osc.type = 'sawtooth'; // Gritty, cool sound
            filter.type = 'lowpass';
            filter.frequency.value = 1000;
            
            gain.gain.value = 0; // Start silent

            osc.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            
            // Fade in
            gain.gain.setTargetAtTime(0.2, audioCtx.currentTime, 0.1);

            // 3. UI Swap
            btn.classList.add('hidden');
            orb.classList.remove('hidden');

            // 4. Start Sensors
            setupSensors();
        });

        function setupSensors() {
            window.addEventListener('deviceorientation', (e) => {
                // Pitch (Left/Right Tilt)
                let freq = Math.max(100, Math.min(2000, 200 + (e.gamma * 15)));
                osc.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.05);

                // Filter (Front/Back Tilt)
                let cut = Math.max(200, Math.min(5000, 1000 + (e.beta * 40)));
                filter.frequency.setTargetAtTime(cut, audioCtx.currentTime, 0.05);

                // Visual Glow
                orb.style.transform = `scale(${1 + Math.abs(e.gamma)/90})`;
                orb.style.filter = `hue-rotate(${e.beta}deg) brightness(${1 + Math.abs(e.gamma)/50})`;
            });

            // Touch the orb to "choke" the sound (Volume)
            window.addEventListener('touchstart', () => gain.gain.setTargetAtTime(0.5, audioCtx.currentTime, 0.05));
            window.addEventListener('touchend', () => gain.gain.setTargetAtTime(0.2, audioCtx.currentTime, 0.05));
        }
    </script>
</body>
</html>
